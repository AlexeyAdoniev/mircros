{{- if .Values.auth.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata: 
  name: auth
  labels: 
    app: auth
spec:
  replicas: {{ .Values.auth.replicas }}
  selector: 
    matchLabels:
      app: auth
  template: 
    metadata:
      labels:
        app: auth
    spec: 
      initContainers: 
        - name: prisma-migrate
          image: {{ .Values.auth.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["sh", "-c"]
          args: 
            - |
              npx prisma migrate dev --config apps/auth/prisma/config.ts --name init
          env:
            {{- include "common.env" . | nindent 12}}
            - name: AUTH_DATABASE_URL
              value: postgresql://postgres:postgres@{{ .Release.Name }}-postgresql.postgresql.svc.cluster.local:5432/jobber-auth?schema=public
      containers:
        - name: auth
          image: {{ .Values.auth.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.auth.port.http }}
            - containerPort: {{ .Values.auth.port.grpc }}
          env:
            {{- include "common.env" . | nindent 12}}
            - name: PORT
              value: "{{ .Values.auth.port.http }}"
            - name: JWT_SECRET
              value: {{ .Values.auth.jwt.secret }}
            - name: JWT_EXPIRE_MS
              value: "{{ .Values.auth.jwt.expirationMs }}"
            - name: AUTH_GRPC_SERVICE_URL
              value: "0.0.0.0:{{ .Values.auth.port.grpc }}"
{{- end}} 